---
# radio-mesh.yml — Activate LoRa mesh (Reticulum) profile
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/radio-mesh.yml

- name: PiRelay — Switch to LoRa Mesh
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Switch to lora-mesh profile
      ansible.builtin.command: /usr/local/bin/switch-profile.sh lora-mesh
      changed_when: true

    - name: Verify lora-mesh.target is active
      ansible.builtin.command: systemctl is-active lora-mesh.target
      register: target_status
      changed_when: false

    - name: Display status
      ansible.builtin.debug:
        msg: "LoRa mesh profile active: {{ target_status.stdout }}"
