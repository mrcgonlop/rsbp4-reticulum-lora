---
# site.yml — Full PiRelay deployment
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/site.yml
#
# Run with --check --diff for dry run.
# Use --tags to target specific roles (e.g. --tags gitea,nginx).

- name: PiRelay — Full Deployment
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - ../group_vars/all.yml

  roles:
    # Phase 1 — Foundation
    - role: base
      tags: [base]

    - role: networking
      tags: [networking]

    # Phase 2 — Core Services
    - role: nginx
      tags: [nginx]

    - role: cockpit
      tags: [cockpit]

    - role: gitea
      tags: [gitea]

    - role: samba
      tags: [samba]

    # Phase 3 — LoRaWAN Gateway services (installed but gated by detection)
    - role: lorawan
      tags: [lorawan]

    # Phase 4 — LoRa Mesh / Reticulum services (installed but gated by detection)
    - role: lora_mesh
      tags: [lora_mesh]

    - role: reticulum
      tags: [reticulum]

    # Phase 4.5 — Hat auto-detection (decides which target to start at boot)
    - role: radio_detect
      tags: [radio_detect]

    # Phase 5 — Wi-Fi HaLow (experimental)
    - role: halow
      tags: [halow]

    # Optional
    - role: monitoring
      tags: [monitoring]

  post_tasks:
    - name: Install switch-profile.sh helper
      ansible.builtin.copy:
        src: ../scripts/switch-profile.sh
        dest: /usr/local/bin/switch-profile.sh
        mode: "0755"
      tags: [radio]

    - name: Trigger hat detection
      ansible.builtin.systemd:
        name: pirelay-detect-hat.service
        state: restarted
      changed_when: false
      tags: [radio_detect]

    - name: Read detected radio profile
      ansible.builtin.slurp:
        src: /run/pirelay/radio-profile
      register: detected_profile_raw
      failed_when: false
      tags: [radio_detect]

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ========================================
          PiRelay deployment complete!
          ========================================
          Hostname:       {{ hostname }}
          Domain:         {{ domain }}
          Detection mode: {{ radio_detection_mode }}
          Radio profile:  {{ (detected_profile_raw.content | b64decode | trim) if detected_profile_raw.content is defined else 'unknown' }}
          Cockpit:        https://{{ domain }}/
          Gitea:          https://{{ domain }}/gitea/
          SSH:            ssh pi@{{ domain }}
          ========================================
          To change hats: power off the Pi, swap the HAT, power on.
          Detection re-runs automatically at boot.
      tags: [always]
