---
# site.yml — Full PiRelay deployment (SX1262 / Reticulum)
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/site.yml
#
# Run with --check --diff for dry run.
# Use --tags to target specific roles (e.g. --tags gitea,nginx).

- name: PiRelay — Full Deployment
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - ../group_vars/all.yml

  roles:
    # Phase 1 — Foundation
    - role: base
      tags: [base]

    - role: networking
      tags: [networking]

    # Phase 2 — Core Services
    - role: nginx
      tags: [nginx]

    - role: cockpit
      tags: [cockpit]

    - role: gitea
      tags: [gitea]

    - role: samba
      tags: [samba]

    # Phase 3 — LoRa Mesh / Reticulum (SX1262)
    - role: lora_mesh
      tags: [lora_mesh]

    - role: reticulum
      tags: [reticulum]

    # Phase 4 — Wi-Fi HaLow (experimental, gated by halow_enable)
    - role: halow
      tags: [halow]

    # Optional
    - role: monitoring
      tags: [monitoring]

  post_tasks:
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ========================================
          PiRelay deployment complete!
          ========================================
          Hostname:       {{ hostname }}
          Domain:         {{ domain }}
          Cockpit:        https://{{ domain }}/
          Gitea:          https://{{ domain }}/gitea/
          SSH:            ssh pi@{{ domain }}
          ========================================
          LoRa stack:     systemctl status lora-mesh.target
          Reticulum:      rnstatus
      tags: [always]
