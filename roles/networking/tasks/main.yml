---
# roles/networking/tasks/main.yml — Network configuration, firewall, mDNS
# Tags: networking

# --- Static IP (optional) ---

- name: Configure static IP on eth0
  ansible.builtin.copy:
    dest: /etc/network/interfaces.d/eth0
    content: |
      auto eth0
      iface eth0 inet static
        address {{ eth0_static_ip }}
        gateway {{ eth0_static_ip | ansible.utils.ipaddr('network') | default('192.168.1.1') }}
        dns-nameservers 1.1.1.1 8.8.8.8
    mode: "0644"
  when: eth0_static_ip | length > 0
  notify: restart networking
  tags: [networking]

# --- mDNS via avahi-daemon (Pi OS default) ---

- name: Install avahi-daemon
  ansible.builtin.apt:
    name: avahi-daemon
    state: present
  tags: [networking]

- name: Enable avahi-daemon
  ansible.builtin.systemd:
    name: avahi-daemon
    enabled: true
    state: started
  tags: [networking]

# --- nftables firewall ---

- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present
  tags: [networking]

- name: Deploy nftables configuration
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0644"
  notify: restart nftables
  tags: [networking]

- name: Enable nftables
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started
  tags: [networking]

# --- IP forwarding (for Reticulum transport) ---

- name: Enable IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    reload: true
  tags: [networking]
