---
# roles/radio_detect/tasks/main.yml — Auto-detect LoRa HAT at boot
# Tags: radio_detect
#
# Probes the SPI/GPIO lines at boot to figure out which hat is physically
# connected, writes /run/pirelay/radio-profile, and starts the matching
# systemd target.

- name: Install detection script
  ansible.builtin.copy:
    src: pirelay-detect-hat
    dest: /usr/local/bin/pirelay-detect-hat
    mode: "0755"
  tags: [radio_detect]

- name: Deploy detection systemd oneshot
  ansible.builtin.template:
    src: pirelay-detect-hat.service.j2
    dest: /etc/systemd/system/pirelay-detect-hat.service
    mode: "0644"
  notify:
    - reload systemd
    - restart pirelay-detect-hat
  tags: [radio_detect]

- name: Enable detection service on boot
  ansible.builtin.systemd:
    name: pirelay-detect-hat.service
    enabled: true
    daemon_reload: true
  tags: [radio_detect]
