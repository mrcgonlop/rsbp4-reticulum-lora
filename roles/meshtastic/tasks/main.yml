---
# roles/meshtastic/tasks/main.yml — Meshtastic daemon for SPI-connected SX1262 HAT
# Tags: meshtastic
#
# Runs meshtasticd on the Pi, talking directly to the Waveshare SX1262 868M
# LoRa HAT over SPI. Gives the Pi a Meshtastic mesh presence without any MCU.
# Package source: openSUSE Build Service (official Meshtastic repo).

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: [meshtastic]

# The OBS Meshtastic beta project publishes separate subrepos per distro.
# Raspbian_13 only ships armhf binaries (no arm64), so 64-bit Pi OS trixie
# hosts must pull from Debian_13 which does publish arm64. Bookworm keeps
# the historical Debian_12 target.
- name: Select Meshtastic OBS subrepo for this distro release
  ansible.builtin.set_fact:
    meshtastic_obs_dist: "Debian_{{ '13' if ansible_distribution_release == 'trixie' else '12' }}"
  tags: [meshtastic]

# Wipe any stale meshtastic apt sources and their cached Packages lists.
# Earlier runs may have written a Debian_12 entry, and apt can still
# resolve against those cached lists even after we overwrite the file.
- name: Remove stale meshtastic apt sources file
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/meshtastic.list
    state: absent
  tags: [meshtastic]

- name: Find stale meshtastic apt cache lists
  ansible.builtin.find:
    paths: /var/lib/apt/lists
    patterns: "*Meshtastic*"
    file_type: any
  register: meshtastic_stale_lists
  tags: [meshtastic]

- name: Remove stale meshtastic apt cache lists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ meshtastic_stale_lists.files }}"
  tags: [meshtastic]

- name: Download Meshtastic apt repo GPG key
  ansible.builtin.get_url:
    url: "https://download.opensuse.org/repositories/network:Meshtastic:beta/{{ meshtastic_obs_dist }}/Release.key"
    dest: /etc/apt/keyrings/meshtastic.asc
    mode: "0644"
    force: true
  tags: [meshtastic]

- name: Add Meshtastic apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/meshtastic.asc] http://download.opensuse.org/repositories/network:/Meshtastic:/beta/{{ meshtastic_obs_dist }}/ /"
    filename: meshtastic
    state: present
    update_cache: true
  tags: [meshtastic]

- name: Install meshtasticd
  ansible.builtin.apt:
    name: meshtasticd
    state: present
  tags: [meshtastic]

# On trixie, Debian's python3-packaging (25.0) ships without a RECORD file,
# so pip cannot replace it even with --break-system-packages — which blocks
# any system-wide pip install of meshtastic (it pins packaging<25.0).
# Install the CLI into an isolated pipx venv instead. pipx is packaged in
# trixie and is the recommended way to install Python CLIs on PEP 668 hosts.
- name: Install pipx
  ansible.builtin.apt:
    name: pipx
    state: present
  tags: [meshtastic]

- name: Install meshtastic Python CLI via pipx
  ansible.builtin.command:
    cmd: pipx install --global meshtastic
    creates: /usr/local/bin/meshtastic
  tags: [meshtastic]

- name: Create meshtasticd config directory
  ansible.builtin.file:
    path: /etc/meshtasticd
    state: directory
    mode: "0755"
  tags: [meshtastic]

- name: Deploy meshtasticd config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/meshtasticd/config.yaml
    mode: "0644"
    backup: true
  notify: restart meshtasticd
  tags: [meshtastic]

- name: Enable and start meshtasticd
  ansible.builtin.systemd:
    name: meshtasticd
    enabled: true
    state: started
    daemon_reload: true
  tags: [meshtastic]
