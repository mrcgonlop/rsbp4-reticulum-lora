---
# roles/lorawan/tasks/main.yml — WM1302 + ChirpStack concentratord + gateway-bridge
# Tags: lorawan

# --- APT repository for ChirpStack ---

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: [lorawan]

- name: Download ChirpStack GPG key
  ansible.builtin.get_url:
    url: https://artifacts.chirpstack.io/packages/4/deb/key.gpg
    dest: /etc/apt/keyrings/chirpstack.gpg
    mode: "0644"
  tags: [lorawan]

- name: Add ChirpStack APT repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/chirpstack.list
    content: "deb [signed-by=/etc/apt/keyrings/chirpstack.gpg] https://artifacts.chirpstack.io/packages/4/deb stable main\n"
    mode: "0644"
  register: chirpstack_repo
  tags: [lorawan]

- name: Update apt cache after adding ChirpStack repo
  ansible.builtin.apt:
    update_cache: true
  when: chirpstack_repo.changed
  tags: [lorawan]

# --- Install ChirpStack components ---

- name: Install ChirpStack concentratord
  ansible.builtin.apt:
    name: chirpstack-concentratord
    state: present
  tags: [lorawan]

- name: Install ChirpStack gateway bridge
  ansible.builtin.apt:
    name: chirpstack-gateway-bridge
    state: present
  tags: [lorawan]

# --- WM1302 GPIO reset script ---

- name: Deploy WM1302 reset script
  ansible.builtin.template:
    src: wm1302-reset.sh.j2
    dest: /usr/local/bin/wm1302-reset.sh
    mode: "0755"
  tags: [lorawan]

# --- ChirpStack concentratord configuration ---

- name: Deploy concentratord configuration
  ansible.builtin.template:
    src: concentratord.toml.j2
    dest: /etc/chirpstack-concentratord/concentratord.toml
    mode: "0644"
  notify: restart chirpstack-concentratord
  tags: [lorawan]

- name: Deploy EU868 channel configuration
  ansible.builtin.template:
    src: channels-eu868.toml.j2
    dest: /etc/chirpstack-concentratord/channels.toml
    mode: "0644"
  notify: restart chirpstack-concentratord
  tags: [lorawan]

# --- ChirpStack gateway bridge configuration ---

- name: Deploy gateway bridge configuration
  ansible.builtin.template:
    src: gateway-bridge.toml.j2
    dest: /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge.toml
    mode: "0644"
  notify: restart chirpstack-gateway-bridge
  tags: [lorawan]

# --- LoRaWAN gateway systemd target ---

- name: Deploy lorawan-gateway.target
  ansible.builtin.copy:
    dest: /etc/systemd/system/lorawan-gateway.target
    content: |
      [Unit]
      Description=LoRaWAN Gateway Services
      Requires=chirpstack-concentratord.service chirpstack-gateway-bridge.service
      After=chirpstack-concentratord.service chirpstack-gateway-bridge.service

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: reload systemd
  tags: [lorawan]

- name: Create concentratord override directory
  ansible.builtin.file:
    path: /etc/systemd/system/chirpstack-concentratord.service.d
    state: directory
    mode: "0755"
  tags: [lorawan]

- name: Bind concentratord to lorawan-gateway.target
  ansible.builtin.copy:
    dest: /etc/systemd/system/chirpstack-concentratord.service.d/target.conf
    content: |
      [Unit]
      PartOf=lorawan-gateway.target

      [Install]
      WantedBy=lorawan-gateway.target
    mode: "0644"
  notify: reload systemd
  tags: [lorawan]

- name: Create gateway-bridge override directory
  ansible.builtin.file:
    path: /etc/systemd/system/chirpstack-gateway-bridge.service.d
    state: directory
    mode: "0755"
  tags: [lorawan]

- name: Bind gateway-bridge to lorawan-gateway.target
  ansible.builtin.copy:
    dest: /etc/systemd/system/chirpstack-gateway-bridge.service.d/target.conf
    content: |
      [Unit]
      PartOf=lorawan-gateway.target

      [Install]
      WantedBy=lorawan-gateway.target
    mode: "0644"
  notify: reload systemd
  tags: [lorawan]

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  tags: [lorawan]

- name: Enable lorawan-gateway.target on boot (if default profile)
  ansible.builtin.systemd:
    name: lorawan-gateway.target
    enabled: "{{ default_radio_profile == 'lorawan-gateway' }}"
  tags: [lorawan]
