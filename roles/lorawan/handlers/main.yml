---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart chirpstack-concentratord
  ansible.builtin.systemd:
    name: chirpstack-concentratord
    state: restarted

- name: restart chirpstack-gateway-bridge
  ansible.builtin.systemd:
    name: chirpstack-gateway-bridge
    state: restarted
