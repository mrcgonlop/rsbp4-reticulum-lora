---
# roles/lora_mesh/tasks/main.yml — RNode firmware flash helper + lora-mesh.target
# Tags: lora_mesh
#
# The radio device is a USB-connected RNode-capable board (LilyGO T-Beam v1.2).
# This role installs the flash helper and the systemd target that groups
# Reticulum + LXMF services. The actual radio is managed by Reticulum's
# RNodeInterface (no separate device daemon needed).

- name: Install RNode dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-serial
    state: present
  tags: [lora_mesh]

# rnodeconf is provided by the `rns` pip package (installed by the reticulum
# role). The standalone `rnodeconf` pip package is deprecated — do not install
# it, it shadows the bundled one with an outdated binary.

- name: Ensure deprecated standalone rnodeconf package is absent
  ansible.builtin.pip:
    name: rnodeconf
    state: absent
    extra_args: --break-system-packages
  tags: [lora_mesh]

- name: Allow pi user to access USB serial devices
  ansible.builtin.user:
    name: pi
    groups: dialout
    append: true
  tags: [lora_mesh]

- name: Deploy RNode flash helper
  ansible.builtin.template:
    src: flash-rnode.sh.j2
    dest: /usr/local/bin/flash-rnode.sh
    mode: "0755"
  tags: [lora_mesh]

- name: Deploy lora-mesh.target
  ansible.builtin.copy:
    dest: /etc/systemd/system/lora-mesh.target
    content: |
      [Unit]
      Description=LoRa Mesh Services (Reticulum + LXMF)
      Wants=reticulum.service lxmf-propagation.service
      After=reticulum.service lxmf-propagation.service

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: reload systemd
  tags: [lora_mesh]

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  tags: [lora_mesh]

- name: Enable lora-mesh.target on boot
  ansible.builtin.systemd:
    name: lora-mesh.target
    enabled: true
  tags: [lora_mesh]
